<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kajal ❤️ Aarif - Love Journey</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
background:#b8e6b8;
}

.header{
height:70px;
background:#ff4f72;
display:flex;
justify-content:space-around;
align-items:center;
color:white;
font-size:22px;
font-weight:bold;
}

#game{
position:relative;
width:100vw;
height:calc(100vh - 70px);
overflow:hidden;
background:#c9efc7;
}

.road{
position:absolute;
left:50%;
transform:translateX(-50%);
width:85%;
max-width:650px;
height:100%;
background:#555;

background:
repeating-linear-gradient(
to bottom,
#555 0px,
#555 60px,
#ffffff 60px,
#ffffff 90px
);

animation:roadMove 1s linear infinite;
}

@keyframes roadMove{
from{
background-position-y:0;
}
to{
background-position-y:90px;
}
}

#goal{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
font-size:65px;
z-index:20;
}

#player{
position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);
font-size:65px;
z-index:100;
}

.controls{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
z-index:500;
}

.controls button{
width:75px;
height:75px;
border:none;
border-radius:50%;
background:#ff4f72;
color:white;
font-size:30px;
}

.row{
display:flex;
gap:10px;
margin-top:10px;
}

#message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:15px;
font-size:30px;
display:none;
z-index:1000;
}

</style>
</head>
<body>

<div class="header">
<div>🪙 Score: <span id="score">0</span></div>
<div>❤️ Lives: <span id="lives">3</span></div>
<div>🏆 Level: <span id="level">1</span></div>
</div>

<div id="game">

<div class="road"></div>

<div id="goal">👦</div>

<div id="player">👧</div>

<div id="message"></div>

</div>

<div class="controls">

<button onclick="moveUp()">⬆</button>

<div class="row">
<button onclick="moveLeft()">⬅</button>
<button onclick="moveDown()">⬇</button>
<button onclick="moveRight()">➡</button>
</div>

</div>

<!-- =========================
PART 02 START
========================= -->

<script>

// Coin System
function spawnCoin(){

const coin=document.createElement("div");

coin.innerHTML="🪙";

coin.style.position="absolute";
coin.style.fontSize="35px";
coin.style.top="-50px";
coin.style.left=(43 + Math.random()*14)+"%";
coin.className="coin";

document.getElementById("game").appendChild(coin);

let coinMove=setInterval(()=>{

coin.style.top=(coin.offsetTop+4)+"px";

let p=player.getBoundingClientRect();
let c=coin.getBoundingClientRect();

if(
p.left < c.right &&
p.right > c.left &&
p.top < c.bottom &&
p.bottom > c.top
){

score+=10;

document.getElementById("score").innerText=score;

coin.remove();

clearInterval(coinMove);

}

if(coin.offsetTop > window.innerHeight){

coin.remove();

clearInterval(coinMove);

}

},30);

}

setInterval(spawnCoin,2500);


// Vehicle System
function spawnVehicle(){

const vehicle=document.createElement("div");

const types=[
"🚗",
"🚕",
"🚙",
"🛵"
];

vehicle.innerHTML=
types[Math.floor(Math.random()*types.length)];

vehicle.style.position="absolute";
vehicle.style.fontSize="50px";
vehicle.style.top="-80px";
vehicle.style.left=(42 + Math.random()*16)+"%";

document.getElementById("game")
.appendChild(vehicle);

let vehicleMove=setInterval(()=>{

vehicle.style.top=
(vehicle.offsetTop+6)+"px";

checkCollision(vehicle);

if(vehicle.offsetTop>
window.innerHeight){

vehicle.remove();

clearInterval(vehicleMove);

}

},25);

}

setInterval(spawnVehicle,1500);


// Collision
function checkCollision(vehicle){

let p=player.getBoundingClientRect();

let v=vehicle.getBoundingClientRect();

if(

p.left < v.right &&
p.right > v.left &&
p.top < v.bottom &&
p.bottom > v.top

){

lives--;

document.getElementById("lives")
.innerText=lives;

x=window.innerWidth/2;
y=window.innerHeight-220;

updatePlayer();

vehicle.remove();

if(lives<=0){

document.getElementById("message")
.style.display="block";

document.getElementById("message")
.innerHTML=
"💀 GAME OVER<br><br><button onclick='location.reload()'>Restart</button>";

}

}

}

</script>

<!-- =========================
PART 02 END
========================= -->
  
<script>

const player=document.getElementById("player");

let score=0;
let lives=3;
let level=1;

let x=window.innerWidth/2;
let y=window.innerHeight-220;

function updatePlayer(){

player.style.left=x+"px";
player.style.top=y+"px";

checkGoal();

}

function moveLeft(){
x-=20;
updatePlayer();
}

function moveRight(){
x+=20;
updatePlayer();
}

function moveUp(){
y-=20;
updatePlayer();
}

function moveDown(){
y+=20;
updatePlayer();
}

document.addEventListener("keydown",(e)=>{

if(e.key==="ArrowLeft") moveLeft();

if(e.key==="ArrowRight") moveRight();

if(e.key==="ArrowUp") moveUp();

if(e.key==="ArrowDown") moveDown();

});

function checkGoal(){

if(y<100){

document.getElementById("message").style.display="block";

document.getElementById("message").innerHTML=
"❤️ Kajal Reached Aarif";

level++;

document.getElementById("level").innerText=level;

setTimeout(()=>{

document.getElementById("message").style.display="none";

y=window.innerHeight-220;

updatePlayer();

},2000);

}

}

updatePlayer();

</script>

</body>
</html>

<!-- =========================
PART 03 START
========================= -->

<style>

.rainDrop{
position:absolute;
width:2px;
height:15px;
background:white;
opacity:.7;
pointer-events:none;
}

.nightMode{
background:#0d1225 !important;
}

.nightMode .road{
background:
repeating-linear-gradient(
to bottom,
#333 0px,
#333 60px,
#ffffff 60px,
#ffffff 90px
);
}

.levelPopup{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px 40px;
border-radius:20px;
font-size:32px;
font-weight:bold;
z-index:999;
}

</style>

<script>

// Speed Control
let trafficSpeed=6;

// Replace old checkGoal function
checkGoal=function(){

if(y<100){

level++;

document.getElementById("level").innerText=level;

trafficSpeed+=1;

showLevelPopup();

y=window.innerHeight-220;

updatePlayer();

if(level>=3){
startRain();
}

if(level>=5){
activateNightMode();
}

}

};

// Level Popup
function showLevelPopup(){

const popup=document.createElement("div");

popup.className="levelPopup";

popup.innerHTML=
"🏆 Level "+level;

document.getElementById("game")
.appendChild(popup);

setTimeout(()=>{
popup.remove();
},2000);

}


// Night Mode
function activateNightMode(){

document.getElementById("game")
.classList.add("nightMode");

}


// Rain Mode
let rainStarted=false;

function startRain(){

if(rainStarted) return;

rainStarted=true;

setInterval(()=>{

for(let i=0;i<4;i++){

const rain=document.createElement("div");

rain.className="rainDrop";

rain.style.left=
Math.random()*window.innerWidth+"px";

rain.style.top="-20px";

document.body.appendChild(rain);

let rainMove=setInterval(()=>{

rain.style.top=
(rain.offsetTop+15)+"px";

if(rain.offsetTop>
window.innerHeight){

rain.remove();

clearInterval(rainMove);

}

},30);

}

},100);

}


// Upgrade Vehicle Speed
const oldSpawnVehicle=spawnVehicle;

spawnVehicle=function(){

const vehicle=document.createElement("div");

const types=["🚗","🚕","🚙","🛵"];

vehicle.innerHTML=
types[Math.floor(Math.random()*types.length)];

vehicle.style.position="absolute";
vehicle.style.fontSize="50px";
vehicle.style.top="-80px";
vehicle.style.left=(42 + Math.random()*16)+"%";

document.getElementById("game")
.appendChild(vehicle);

let vehicleMove=setInterval(()=>{

vehicle.style.top=
(vehicle.offsetTop+trafficSpeed)+"px";

checkCollision(vehicle);

if(vehicle.offsetTop>
window.innerHeight){

vehicle.remove();

clearInterval(vehicleMove);

}

},25);

};

</script>

<!-- =========================
PART 03 END
========================= -->
