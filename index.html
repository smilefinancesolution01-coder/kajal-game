<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kajal ❤️ Aarif - Love Journey V3</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
background:#87ceeb;
}

#startScreen{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
color:white;
}

#startScreen h1{
font-size:50px;
margin-bottom:20px;
}

#startBtn{
padding:15px 40px;
font-size:24px;
border:none;
border-radius:30px;
cursor:pointer;
}

.header{
height:60px;
background:#ff4d6d;
display:flex;
justify-content:space-around;
align-items:center;
color:white;
font-weight:bold;
}

#game{
position:relative;
width:100vw;
height:calc(100vh - 60px);
overflow:hidden;
background:#c8f7c5;
}

.road{
position:absolute;
left:50%;
transform:translateX(-50%);
width:320px;
height:100%;
background:#555;
border-left:8px solid white;
border-right:8px solid white;
}

#player{
position:absolute;
width:70px;
height:70px;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:60px;
z-index:100;
}

#goal{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
font-size:60px;
}

#message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:15px;
display:none;
font-size:30px;
z-index:500;
}

.controls{
position:fixed;
bottom:10px;
width:100%;
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

.controls button{
width:70px;
height:70px;
font-size:28px;
border:none;
border-radius:50%;
background:#ff4d6d;
color:white;
}

.row{
display:flex;
gap:10px;
}

</style>
</head>

<body>

<div id="startScreen">
<h1>Kajal ❤️ Aarif</h1>
<p>Help Kajal reach Aarif</p>
<br>
<button id="startBtn">Start Game</button>
</div>

<div class="header">
<div>🪙 Score: <span id="score">0</span></div>
<div>❤️ Lives: <span id="lives">3</span></div>
<div>🏆 Level: <span id="level">1</span></div>
</div>

<div id="game">

<div class="road"></div>

<div id="goal">👦</div>

  <!-- Coins -->
<div class="coin" id="coin1">🪙</div>
<div class="coin" id="coin2">🪙</div>
<div class="coin" id="coin3">🪙</div>

<!-- Cars -->
<div class="car" id="car1">🚗</div>
<div class="car" id="car2">🚕</div>

<!-- Bike -->
<div class="bike" id="bike1">🛵</div>

<div id="player">👧</div>

<div id="message"></div>

</div>

<div class="controls">
<button onclick="moveUp()">⬆</button>

<div class="row">
<button onclick="moveLeft()">⬅</button>
<button onclick="moveDown()">⬇</button>
<button onclick="moveRight()">➡</button>
</div>
</div>

<script>

let player=document.getElementById("player");

let score=0;
let lives=3;
let level=1;

let x=window.innerWidth/2;
let y=window.innerHeight-180;

document.getElementById("startBtn").onclick=function(){
document.getElementById("startScreen").style.display="none";
}

function updatePlayer(){
player.style.left=x+"px";
player.style.top=y+"px";
checkGoal();
}

function moveLeft(){x-=20;updatePlayer();}
function moveRight(){x+=20;updatePlayer();}
function moveUp(){y-=20;updatePlayer();}
function moveDown(){y+=20;updatePlayer();}

document.addEventListener("keydown",(e)=>{

if(e.key==="ArrowLeft") moveLeft();
if(e.key==="ArrowRight") moveRight();
if(e.key==="ArrowUp") moveUp();
if(e.key==="ArrowDown") moveDown();

});

function checkGoal(){

if(y<100){

document.getElementById("message").style.display="block";

document.getElementById("message").innerHTML=
"❤️ Kajal reached Aarif!";

level++;

document.getElementById("level").innerText=level;

setTimeout(()=>{
document.getElementById("message").style.display="none";
y=window.innerHeight-180;
updatePlayer();
},2000);

}

}

updatePlayer();

</script>

</body>
</html>
